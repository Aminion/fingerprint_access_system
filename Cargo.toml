[package]
name = "fingerprint-access-control"
version = "0.1.0"
edition = "2021"

[dependencies]
# Embassy Core
embassy-executor = { version = "0.6.0", features = ["task-arena-size-2048", "arch-cortex-m", "executor-thread", "defmt", "integrated-timers"] }
embassy-time = { version = "0.3.2", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }
embassy-sync = { version = "0.6.0", features = ["defmt"] }

# STM32 Hardware Abstraction (Embassy)
# Note: critical-section-single-core is NOT here, it's in cortex-m below

embassy-stm32 = { version = "0.1.0", features = ["defmt", "stm32g031k8", "time-driver-any", "memory-x", "unstable-pac", "time"] }

# Hardware Support & Critical Section
# This is what fixes the "undefined symbol: _critical_section_1_0_acquire" error
cortex-m = { version = "0.7.7", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "0.7.3"

# Logging and Debugging
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

[profile.release]
debug = 2
lto = true
opt-level = 'z' # Optimize for binary size (important for 8KB RAM)

[profile.dev]
debug = 2
lto = true
opt-level = 's' # Optimize for size even in debug mode

[[bin]]
name = "fingerprint-access-control"
test = false
bench = false